services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: java_admin
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d java_admin"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/java_admin
      DB_USERNAME: app
      DB_PASSWORD: app
      DB_POOL_MAX: 10
    ports:
      - "127.0.0.1:8080:8080"
    stop_grace_period: 25s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
