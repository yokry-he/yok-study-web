<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P1 技术证据场景</title>
    <link rel="stylesheet" href="../shared/demo.css" />
    <style>
      .p1-stage {
        max-width: 1200px;
        margin: 36px auto 0;
      }

      .p1-shell {
        overflow: hidden;
        border: 1px solid #b6c8c1;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 20px 54px rgb(34 64 54 / 10%);
      }

      .p1-shell__bar {
        display: flex;
        min-height: 58px;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid #d6e0dc;
        padding: 0 22px;
        background: #f5f8f7;
      }

      .p1-shell__name {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 12px;
        font-weight: 900;
      }

      .p1-shell__mark {
        display: grid;
        width: 34px;
        height: 34px;
        flex: 0 0 34px;
        place-items: center;
        border-radius: 7px;
        background: #087f68;
        color: #fff;
        font-weight: 950;
      }

      .p1-shell__context {
        overflow: hidden;
        color: #64766f;
        font: 13px ui-monospace, SFMono-Regular, Menlo, monospace;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .p1-content { padding: 24px; }

      .p1-metrics {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        margin-bottom: 20px;
      }

      .p1-metric {
        border: 1px solid #cbd8d3;
        border-left: 5px solid #087f68;
        border-radius: 6px;
        padding: 16px;
        background: #fbfdfc;
      }

      .p1-metric:nth-child(2) { border-left-color: #7952a5; }
      .p1-metric:nth-child(3) { border-left-color: #d78a20; }
      .p1-metric:nth-child(4) { border-left-color: #2d7895; }
      .p1-metric__label { display: block; color: #64766f; font-size: 12px; font-weight: 850; }
      .p1-metric__value { display: block; margin-top: 8px; color: #21312b; font-size: 25px; font-weight: 950; }

      .p1-flow {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 18px;
      }

      .p1-step {
        position: relative;
        display: grid;
        min-height: 148px;
        align-content: center;
        gap: 9px;
        border: 1px solid #c7d5d0;
        border-top: 5px solid #087f68;
        border-radius: 7px;
        padding: 17px;
        background: #fbfdfc;
      }

      .p1-step:nth-child(2) { border-top-color: #7952a5; }
      .p1-step:nth-child(3) { border-top-color: #d78a20; }
      .p1-step:nth-child(4) { border-top-color: #2d7895; }
      .p1-step:nth-child(5) { border-top-color: #b43a44; }
      .p1-step:not(:last-child)::after { position: absolute; z-index: 2; top: 50%; right: -23px; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 12px solid #7d9189; content: ""; transform: translateY(-50%); }
      .p1-step__index { color: #087f68; font: 900 13px ui-monospace, SFMono-Regular, Menlo, monospace; }
      .p1-step__title { margin: 0; font-size: 17px; }
      .p1-step__text { margin: 0; color: #61736c; font-size: 13px; line-height: 1.55; }

      .p1-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
      }

      .p1-panel {
        min-width: 0;
        border: 1px solid #c8d5d0;
        border-radius: 7px;
        overflow: hidden;
      }

      .p1-panel__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 15px 18px;
        background: #eef4f1;
      }

      .p1-panel__title { margin: 0; font-size: 17px; }
      .p1-panel__badge { border-radius: 999px; padding: 4px 9px; background: #e7f7f1; color: #087f68; font-size: 12px; font-weight: 900; white-space: nowrap; }
      .p1-panel__body { padding: 18px; }

      .p1-list {
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .p1-list__item {
        display: grid;
        grid-template-columns: 24px 1fr;
        gap: 10px;
        align-items: start;
        color: #4e615a;
        font-size: 14px;
        line-height: 1.5;
      }

      .p1-list__item::before {
        display: grid;
        width: 22px;
        height: 22px;
        place-items: center;
        border-radius: 50%;
        background: #e7f7f1;
        color: #087f68;
        content: "✓";
        font-size: 12px;
        font-weight: 950;
      }

      .p1-table-wrap { overflow-x: auto; }

      .p1-table {
        width: 100%;
        min-width: 720px;
        border-collapse: collapse;
        text-align: left;
      }

      .p1-table th,
      .p1-table td {
        border-bottom: 1px solid #dfe7e4;
        padding: 13px 15px;
        color: #40534c;
        font-size: 13px;
      }

      .p1-table th { background: #eef4f1; color: #52655e; font-weight: 900; }
      .p1-table td:first-child { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-weight: 800; }

      .p1-status {
        display: inline-flex;
        border-radius: 999px;
        padding: 4px 9px;
        background: #e7f7f1;
        color: #087f68;
        font-size: 12px;
        font-weight: 900;
        white-space: nowrap;
      }

      .p1-status--warn { background: #fff1d8; color: #956100; }
      .p1-status--error { background: #fdebed; color: #aa2d38; }
      .p1-status--neutral { background: #edf1ef; color: #5b6c65; }

      .p1-callout {
        display: grid;
        grid-template-columns: 40px 1fr;
        gap: 12px;
        margin-top: 20px;
        border-left: 5px solid #d88a20;
        padding: 15px 17px;
        background: #fff8e9;
      }

      .p1-callout__mark { display: grid; width: 34px; height: 34px; place-items: center; border-radius: 50%; background: #d88a20; color: #fff; font-weight: 950; }
      .p1-callout__text { margin: 2px 0 0; color: #5d4920; line-height: 1.55; }

      @media (max-width: 760px) {
        .demo-frame { padding: 22px; }
        .demo-frame::before { inset: 10px; }
        .p1-stage { margin-top: 28px; }
        .p1-shell__bar { align-items: flex-start; flex-direction: column; padding: 15px; }
        .p1-content { padding: 16px; }
        .p1-metrics,
        .p1-flow,
        .p1-grid { grid-template-columns: 1fr; }
        .p1-step { min-height: 108px; }
        .p1-step:not(:last-child)::after { top: auto; right: 50%; bottom: -18px; border-top: 11px solid #7d9189; border-right: 7px solid transparent; border-bottom: 0; border-left: 7px solid transparent; transform: translateX(50%); }
        .p1-metrics .p1-metric:nth-child(n+3),
        .p1-flow .p1-step:nth-child(n+4),
        .p1-grid .p1-panel:nth-child(n+3) { display: none; }
      }
    </style>
  </head>
  <body>
    <main class="demo-frame">
      <p id="kicker" class="demo-kicker"></p>
      <h1 id="title" class="demo-title"></h1>
      <p id="subtitle" class="demo-subtitle"></p>
      <section class="p1-stage p1-shell">
        <header class="p1-shell__bar"><div class="p1-shell__name"><span id="mark" class="p1-shell__mark"></span><span id="module"></span></div><span id="context" class="p1-shell__context"></span></header>
        <div id="content" class="p1-content"></div>
      </section>
    </main>

      document.querySelector('#kicker').textContent = data.k
      document.querySelector('#title').textContent = data.t
      document.querySelector('#subtitle').textContent = data.s
      document.querySelector('#mark').textContent = data.m
      document.querySelector('#module').textContent = data.k.split(' · ')[0] + ' 教学证据'
      document.querySelector('#context').textContent = data.c

      const escapeHtml = value => String(value).replace(/[&<>"']/g, character => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[character]))
      const statusClass = value => /fail|error|denied|403|waiting|restarting|阻塞|失败/i.test(value) ? 'p1-status p1-status--error' : /warn|empty|neutral|action|inspect|loading|refuse/i.test(value) ? 'p1-status p1-status--warn' : 'p1-status'

      const renderFlow = scene => `<div class="p1-flow">${scene.steps.map((step,index)=>`<article class="p1-step"><span class="p1-step__index">0${index+1}</span><h2 class="p1-step__title">${escapeHtml(step[0])}</h2><p class="p1-step__text">${escapeHtml(step[1])}</p></article>`).join('')}</div>${callout(scene.note)}`
      const renderPanels = scene => `<div class="p1-grid">${scene.panels.map(panel=>`<article class="p1-panel"><header class="p1-panel__head"><h2 class="p1-panel__title">${escapeHtml(panel[0])}</h2><span class="${statusClass(panel[2])}">${escapeHtml(panel[2])}</span></header><div class="p1-panel__body"><ul class="p1-list"><li class="p1-list__item">${escapeHtml(panel[1])}</li><li class="p1-list__item">状态、操作与恢复路径保持一致</li></ul></div></article>`).join('')}</div>${callout(scene.note)}`

      document.querySelector('#content').innerHTML = data.type === 'flow' ? renderFlow(data) : data.type === 'panels' ? renderPanels(data) : renderTable(data)
