<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go API 请求往返路径</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f4f8f6;
        color: #17221e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 1600px;
        height: 900px;
        margin: 0;
        overflow: hidden;
        background: #f4f8f6;
      }

      .canvas {
        position: relative;
        width: 1600px;
        height: 900px;
        padding: 76px 88px;
      }

      .canvas::before {
        position: absolute;
        inset: 30px;
        border: 1px solid #c8d8d2;
        content: "";
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #087f68;
        font-size: 20px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: 44px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 14px 0 0;
        color: #52645d;
        font-size: 22px;
      }

      .journey {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 24px;
        margin-top: 82px;
      }

      .stage {
        position: relative;
        display: flex;
        min-width: 0;
        height: 236px;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: 2px solid #9bb5ac;
        border-radius: 8px;
        background: #ffffff;
        text-align: center;
      }

      .stage::after {
        position: absolute;
        top: 111px;
        right: -25px;
        width: 25px;
        height: 4px;
        background: #09a17f;
        content: "";
      }

      .stage::before {
        position: absolute;
        z-index: 2;
        top: 104px;
        right: -27px;
        width: 0;
        height: 0;
        border-top: 9px solid transparent;
        border-bottom: 9px solid transparent;
        border-left: 13px solid #09a17f;
        content: "";
      }

      .stage:last-child::after,
      .stage:last-child::before {
        display: none;
      }

      .stage--edge {
        border-color: #0b9f84;
        background: #eaf9f5;
      }

      .stage--logic {
        border-color: #2d7390;
        background: #eef8fb;
      }

      .stage--data {
        border-color: #7556a3;
        background: #f7f2fb;
      }

      .stage__number {
        display: grid;
        width: 54px;
        height: 54px;
        place-items: center;
        border-radius: 50%;
        background: #17221e;
        color: #ffffff;
        font-size: 22px;
        font-weight: 800;
      }

      .stage__title {
        margin-top: 24px;
        font-size: 24px;
        font-weight: 800;
        white-space: nowrap;
      }

      .stage__detail {
        margin-top: 10px;
        color: #52645d;
        font-size: 16px;
        line-height: 1.5;
      }

      .return-path {
        position: relative;
        height: 104px;
        margin: 58px 88px 0;
        border-right: 4px solid #e29b21;
        border-bottom: 4px solid #e29b21;
        border-left: 4px solid #e29b21;
      }

      .return-path::before {
        position: absolute;
        left: -12px;
        bottom: -11px;
        width: 0;
        height: 0;
        border-top: 10px solid transparent;
        border-right: 16px solid #e29b21;
        border-bottom: 10px solid transparent;
        content: "";
      }

      .return-path__label {
        position: absolute;
        left: 50%;
        bottom: -22px;
        padding: 9px 18px;
        transform: translateX(-50%);
        background: #f4f8f6;
        color: #9a5c00;
        font-size: 19px;
        font-weight: 800;
      }

      .legend {
        position: absolute;
        right: 92px;
        bottom: 66px;
        display: flex;
        gap: 26px;
        color: #52645d;
        font-size: 16px;
      }

      .legend__item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .legend__line {
        width: 34px;
        height: 4px;
        background: #09a17f;
      }

      .legend__line--return {
        background: #e29b21;
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <p class="eyebrow">请求生命周期图解</p>
      <h1>一条 Go API 请求，经过哪些边界？</h1>
      <p class="subtitle">绿色路径处理输入，黄色路径返回统一响应；每一层只负责自己的职责。</p>

      <section class="journey" aria-label="Go API 请求处理阶段">
        <article class="stage stage--edge">
          <span class="stage__number">1</span>
          <strong class="stage__title">客户端</strong>
          <span class="stage__detail">方法、路径<br />Header、JSON</span>
        </article>
        <article class="stage stage--edge">
          <span class="stage__number">2</span>
          <strong class="stage__title">中间件</strong>
          <span class="stage__detail">Request ID<br />Recover、超时</span>
        </article>
        <article class="stage stage--edge">
          <span class="stage__number">3</span>
          <strong class="stage__title">严格解码</strong>
          <span class="stage__detail">大小、类型<br />未知字段、尾随值</span>
        </article>
        <article class="stage stage--logic">
          <span class="stage__number">4</span>
          <strong class="stage__title">Handler</strong>
          <span class="stage__detail">翻译 HTTP<br />不写业务规则</span>
        </article>
        <article class="stage stage--logic">
          <span class="stage__number">5</span>
          <strong class="stage__title">Service</strong>
          <span class="stage__detail">校验、状态机<br />业务编排</span>
        </article>
        <article class="stage stage--data">
          <span class="stage__number">6</span>
          <strong class="stage__title">Repository</strong>
          <span class="stage__detail">SQL、事务<br />错误映射</span>
        </article>
        <article class="stage stage--data">
          <span class="stage__number">7</span>
          <strong class="stage__title">PostgreSQL</strong>
          <span class="stage__detail">约束、索引<br />原子更新</span>
        </article>
      </section>

      <div class="return-path" aria-label="响应返回路径">
        <span class="return-path__label">状态码 + 统一 JSON + 同一个 Request ID</span>
      </div>

      <div class="legend" aria-label="路径图例">
        <span class="legend__item"><i class="legend__line"></i>请求进入</span>
        <span class="legend__item"><i class="legend__line legend__line--return"></i>响应返回</span>
      </div>
    </main>
  </body>
</html>
